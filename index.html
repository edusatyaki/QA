<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xshare | Interview Insights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-active { color: #2563eb; position: relative; }
        .nav-active::after {
            content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            width: 16px; height: 2px; background: #2563eb;
        }
        .hidden-comments { display: none; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg text-white flex items-center justify-center w-9 h-9 shadow-sm">
                <span class="text-xl font-bold">X</span>
            </div>
            <h1 class="text-lg font-bold text-slate-800 tracking-tight text-nowrap">Xshare</h1>
        </div>
        <button aria-label="Profile"><i class="fa-regular fa-circle-user text-2xl text-slate-400"></i></button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
            <div class="flex gap-3">
                <div class="w-10 h-10 rounded-lg bg-blue-100 text-blue-600 shrink-0 flex items-center justify-center font-bold">C</div>
                <textarea class="grow text-slate-700 outline-none resize-none pt-2 placeholder-slate-400 text-sm font-medium" placeholder="Share your experience..." rows="2"></textarea>
            </div>
            <footer class="flex justify-end mt-3 border-t border-slate-100 pt-3">
                <button class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-bold active:scale-95 transition-all shadow-md">Post</button>
            </footer>
        </section>

        <section class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" placeholder="Search rounds or companies..." class="w-full bg-white border border-slate-200 rounded-lg py-2.5 pl-11 pr-4 text-sm outline-none focus:border-blue-500 shadow-sm transition-all">
        </section>

        <section class="space-y-4">
            

            <article class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <header class="px-4 py-4 border-b border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-[14px] bg-[#3b66f5] text-white flex items-center justify-center text-lg font-bold shadow-sm">P</div>
                        <div class="flex flex-col">
                            <h3 class="font-bold text-[#2d3748] text-[15px] leading-tight">Plaban Kumar Nath</h3>
                            <p class="text-[13px] text-[#a0aec0] font-medium mt-1">Member • 29/03/2026</p>
                        </div>
                        <div class="ml-auto">
                             
                        </div>
                    </div>
                </header>

                <div class="p-4 space-y-4">
                    
                    <div class="flex gap-4"><span class="text-emerald-500 font-black text-sm">Q</span><p class="text-sm text-slate-500 leading-relaxed font-medium">Used hashmap to store visited numbers and checked complement in $O(n)$ time.</p></div>

                    <footer class="flex items-center gap-6 pt-3 border-t border-slate-50 text-slate-400 text-xs font-bold">
                        <button class="flex items-center gap-1.5 hover:text-blue-600 transition-colors"><i class="fa-regular fa-thumbs-up text-base"></i> 12</button>
                        <button onclick="toggleComments('commentArea1')" class="flex items-center gap-1.5 hover:text-blue-600 transition-colors"><i class="fa-regular fa-comment text-base"></i> 2 Comments</button>
                    </footer>

                    <section id="commentArea1" class="hidden-comments fade-in space-y-4 pt-4 border-t border-slate-100 mt-2">
                        <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg p-1.5 pl-3 focus-within:bg-white transition-all">
                            <input type="text" placeholder="Add a comment..." class="grow bg-transparent outline-none text-xs text-slate-600 font-medium py-1">
                            <button class="bg-blue-600 text-white w-8 h-8 rounded-md flex items-center justify-center shadow-md active:scale-90 transition-transform"><i class="fa-solid fa-paper-plane text-[10px]"></i></button>
                        </div>

                        <div class="flex gap-3 items-start group">
                            <div class="w-8 h-8 shrink-0 rounded-[10px] bg-orange-500 text-white flex items-center justify-center font-bold text-[10px]">JD</div>
                            <div class="grow space-y-1">
                                <div class="bg-slate-50 border border-slate-100 rounded-2xl rounded-tl-none p-3 group-hover:bg-slate-100/50 transition-colors">
                                    <div class="flex justify-between items-center mb-1">
                                        <h5 class="font-bold text-[10px] text-slate-900 tracking-tight">JANE DOE</h5>
                                        <span class="text-[9px] text-slate-400 font-medium tracking-tight">2h ago</span>
                                    </div>
                                    <p class="text-xs text-slate-600 leading-normal font-medium">Standard approach, works every time!</p>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </article>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center py-2 shadow-2xl z-50">
        <button class="flex flex-col items-center px-3 nav-active"><i class="fa-solid fa-suitcase text-lg"></i><span class="text-[9px] mt-1 font-bold uppercase">Experience</span></button>
        <button class="flex flex-col items-center px-3 text-slate-400"><i class="fa-solid fa-comment-dots text-lg"></i><span class="text-[9px] mt-1 font-bold uppercase">QA</span></button>
        <button class="flex flex-col items-center px-3 text-slate-400"><i class="fa-solid fa-building text-lg"></i><span class="text-[9px] mt-1 font-bold uppercase">Job</span></button>
        <button class="flex flex-col items-center px-3 text-slate-400"><i class="fa-solid fa-code text-lg"></i><span class="text-[9px] mt-1 font-bold uppercase">Hacks</span></button>
    </nav>

    <script>
        function toggleComments(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.display = (el.style.display === "block") ? "none" : "block";
        }
    </script>
</body>
</html>
